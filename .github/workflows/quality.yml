name: quality
on:
  push:
  pull_request:
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile Python tools
        run: python -m compileall tools
      - name: Smoke test inventory tool
        run: python tools/inventory/verify_artifacts.py tests/fixtures --json
